services:
  rgesn:
    build:
      context: ..
      dockerfile: rgesn/Dockerfile
    image: rgesn-mcp
    ports:
      - "8002:8000"
    environment:
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://localhost:8002}
      MCP_TOKEN_REQUEST_URL: ${MCP_TOKEN_REQUEST_URL:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    volumes:
      - rgesn_tokens:/app/tokens

    # Reverse proxy auto-discovery labels
    # Traefik: enable=true triggers Docker provider discovery
    # Caddy: uses caddy-docker-proxy (https://github.com/lucaslorentz/caddy-docker-proxy)
    labels:
      # Traefik
      - "traefik.enable=true"
      - "traefik.http.routers.rgesn.rule=Host(`rgesn.${DOMAIN}`)"
      - "traefik.http.routers.rgesn.entrypoints=websecure"
      - "traefik.http.routers.rgesn.tls=true"
      - "traefik.http.services.rgesn.loadbalancer.server.port=8000"
      # Caddy (caddy-docker-proxy)
      - "caddy=rgesn.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 8000}}"

    networks:
      - proxy

volumes:
  rgesn_tokens:

networks:
  proxy:
    external: true
