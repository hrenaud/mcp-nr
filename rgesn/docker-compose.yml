# RGESN MCP Server — Docker Compose
# Forme canonique partagée par les 3 MCP (greenit/rgaa/rgesn).
# Divergences permises : nom du service, image, port externe, sous-domaine.

services:
  rgesn:
    build:
      context: ..
      dockerfile: rgesn/Dockerfile
    image: rgesn-mcp
    ports:
      - "8002:8000"
    environment:
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://localhost:8002}
      MCP_TOKEN_REQUEST_URL: ${MCP_TOKEN_REQUEST_URL:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    # Bind mount des tokens (CRITIQUE : sans tokens présents au boot en HTTP,
    # le serveur refuse de démarrer — cf. fail-safe auth dans core/factory.py).
    volumes:
      - ./tokens:/app/tokens
    restart: unless-stopped
    # Reverse proxy auto-discovery (Traefik + Caddy via caddy-docker-proxy)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rgesn.rule=Host(`rgesn.${DOMAIN}`)"
      - "traefik.http.routers.rgesn.entrypoints=websecure"
      - "traefik.http.routers.rgesn.tls=true"
      - "traefik.http.services.rgesn.loadbalancer.server.port=8000"
      - "caddy=rgesn.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 8000}}"
    networks:
      - proxy

networks:
  proxy:
    external: true
