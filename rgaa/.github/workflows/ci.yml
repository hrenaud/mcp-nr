name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install fastmcp httpx beautifulsoup4 lxml pytest pytest-asyncio

      - name: Run tests
        working-directory: files
        run: pytest ../tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rgaa-mcp .

      - name: Smoke test
        run: docker run --rm rgaa-mcp --health
